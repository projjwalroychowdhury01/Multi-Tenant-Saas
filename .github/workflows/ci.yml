name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry==1.8.3
      - name: Install dependencies
        run: poetry install --with dev
      - name: black
        run: poetry run black --check .
      - name: isort
        run: poetry run isort --check-only .
      - name: flake8
        run: poetry run flake8 --max-line-length=100 --extend-ignore=E203,W503 .
      - name: mypy
        run: poetry run mypy apps/ config/ --ignore-missing-imports

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_db
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://saas_user:saas_password@localhost:5432/saas_db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: ci-secret-key-not-for-production
      JWT_SIGNING_KEY: ci-jwt-key-not-for-production
      API_KEY_SECRET: ci-api-key-secret-not-for-prod
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry==1.8.3
      - name: Install dependencies
        run: poetry install --with dev
      - name: Run migrations
        run: poetry run python manage.py migrate
      - name: Run tests with coverage
        run: |
          poetry run pytest tests/ \
            --cov=apps \
            --cov-report=term-missing \
            --cov-fail-under=70
      - name: Isolation suite (must be 100%)
        run: poetry run pytest tests/isolation/ -v

  schema:
    name: OpenAPI Schema Validation
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URL: postgres://saas_user:saas_password@localhost:5432/saas_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-production
      JWT_SIGNING_KEY: ci-jwt-key
      API_KEY_SECRET: ci-api-key-secret
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_db
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry==1.8.3
      - name: Install dependencies
        run: poetry install --with dev
      - name: Run migrations
        run: poetry run python manage.py migrate
      - name: Validate OpenAPI schema
        run: |
          poetry run python manage.py spectacular \
            --validate \
            --fail-on-warn \
            --file /tmp/schema.yml
